# Fly.io configuration for the Finance_lab FastAPI service.
# App name is intentionally left for `fly launch` to fill in (or set
# manually). Region defaults to nrt (Tokyo) so Korea/Japan users hit a
# nearby edge; change to sin/sea/iad as needed.

app = "finance-lab-api"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "prod"
  LOG_LEVEL = "info"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    method = "GET"
    path = "/health"
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
